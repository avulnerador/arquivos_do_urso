<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urso — Links</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="fireflies"></canvas>
  <div id="glow"></div>

  <div class="container">
    <div class="profile">
      <img src="avatar.png" alt="avatar" class="avatar" onerror="this.style.display='none'">
      <h1>🐾 Urso</h1>
      <p class="subtitle">Datapacks, mods e outras criações</p>
    </div>

    <div id="links" class="links"></div>

    <footer>
      <p>feito na toca <span class="paw">🐾</span></p>
    </footer>
  </div>

  <script>
    // brilho seguindo o mouse
    const glow = document.getElementById('glow');
    window.addEventListener('mousemove', (e) => {
      glow.style.opacity = '1';
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
    window.addEventListener('mouseleave', () => glow.style.opacity = '0');

    // vaga-lumes flutuando no fundo
    const canvas = document.getElementById('fireflies');
    const ctx = canvas.getContext('2d');
    let w, h, flies;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function makeFlies(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.5,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
        phase: Math.random() * Math.PI * 2,
      }));
    }
    flies = makeFlies(Math.min(40, Math.floor((w * h) / 30000)));

    function tick(t) {
      ctx.clearRect(0, 0, w, h);
      for (const f of flies) {
        f.x += f.vx;
        f.y += f.vy;
        if (f.x < 0) f.x = w; if (f.x > w) f.x = 0;
        if (f.y < 0) f.y = h; if (f.y > h) f.y = 0;

        const flicker = 0.4 + 0.6 * Math.abs(Math.sin(t / 1200 + f.phase));
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(224, 164, 88, ${flicker * 0.7})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(224, 164, 88, 0.8)';
        ctx.fill();
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // carrega os links do links.json
    async function carregarLinks() {
      const container = document.getElementById('links');
      try {
        const res = await fetch('links.json?_=' + Date.now());
        const links = await res.json();

        if (!links.length) {
          container.innerHTML = '<p class="empty">Nenhum link ainda.</p>';
          return;
        }

        container.innerHTML = links.map(link => `
          <a class="link-card" href="${link.url}" target="_blank" rel="noopener noreferrer">
            ${link.image ? `<div class="link-thumb-wrap"><img class="link-thumb" src="${link.image}" alt=""></div>` : ''}
            <div class="link-info">
              <span class="link-title">${link.title}</span>
              ${link.desc ? `<span class="link-desc">${link.desc}</span>` : ''}
            </div>
            <span class="link-icon">↓</span>
          </a>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="empty">Erro ao carregar links.</p>';
      }
    }
    carregarLinks();
  </script>
</body>
</html>
